name: Build APK Simple

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install buildozer
          sudo apt-get update
          sudo apt-get install -y build-essential git ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev libsdl2-gfx-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good libgtk-3-dev libpq-dev openjdk-17-jdk autoconf automake libtool
          
      - name: Build APK
        id: build_apk
        run: |
          cd projects/zhouyi
          # 初始化并构建
          buildozer init 2>/dev/null || true
          buildozer android debug
        continue-on-error: true
      
      - name: Find and Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zhouyi-apk
          path: |
            **/*.apk
            projects/zhouyi/bin/*.apk
            projects/zhouyi/.buildozer/android/platform/build-armeabi-v7a_arm64-v8a/dists/*/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
